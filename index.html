<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4 p-md-5">

    <div class="container bg-white p-4 p-md-5 rounded shadow" style="max-width: 800px;">
        <h2 class="mb-4 text-primary border-bottom pb-2">Contact Form</h2>
        
        <form>
            <div class="row mb-3">
                
                <div class="col-md-6 mb-3 mb-md-0">
                    <label for="fullName" class="form-label fw-bold text-primary">Full Name</label>
                    <input type="text" class="form-control form-control-lg border-primary bg-light" id="fullName" aria-label="Enter your full name" placeholder="Ex: Jane Doe" required>
                </div>

                <div class="col-md-6">
                    <label for="emailAddress" class="form-label fw-bold text-info">Email Address</label>
                    <input type="email" class="form-control form-control-sm border-info bg-light" id="emailAddress" aria-describedby="emailHelp" placeholder="Ex: jane@example.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="message" class="form-label fw-bold">Message</label>
                <textarea class="form-control border-secondary bg-light" id="message" rows="4" aria-label="Enter your message here" placeholder="How can we help you?"></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold d-block">Preferred Contact Method</label>
                
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="contactEmail" value="email" aria-label="Prefer contact via Email">
                    <label class="form-check-label" for="contactEmail">Email</label>
                </div>
                
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="contactPhone" value="phone" aria-label="Prefer contact via Phone">
                    <label class="form-check-label" for="contactPhone">Phone</label>
                </div>
                
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="contactWhatsApp" value="whatsapp" aria-label="Prefer contact via WhatsApp">
                    <label class="form-check-label" for="contactWhatsApp">WhatsApp</label>
                </div>
            </div>

            <div class="mb-4">
                <label for="favColor" class="form-label fw-bold">Favorite Color</label>
                <input type="color" class="form-control form-control-color border-dark" id="favColor" value="#0d6efd" aria-label="Choose your favorite color" title="Choose your color">
            </div>

            <hr class="my-4">

            <div class="mb-3">
                <label for="userId" class="form-label text-muted">User ID</label>
                <input type="text" id="userId" class="form-control bg-secondary text-white border-0" value="USR-99824" aria-label="Disabled User ID field" disabled>
            </div>

            <div class="mb-4">
                <label for="accountType" class="form-label text-muted mb-0">Account Type</label>
                <input type="text" readonly class="form-control-plaintext fw-bold text-success" id="accountType" value="Student" aria-label="Read-only account type">
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">Submit Form</button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
